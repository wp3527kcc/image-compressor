<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 图片/视频压缩工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }
    h1 {
      font-size: 1.4rem;
      color: #111827;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .form {
      display: grid;
      gap: 12px;
    }
    input {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      color: #111827;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 11px 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      margin-top: 12px;
      min-height: 20px;
      font-size: 0.88rem;
      color: #6b7280;
      line-height: 1.5;
    }
    .message.error { color: #b91c1c; }
    .links {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.88rem;
    }
    a { color: #4f46e5; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>注册账号</h1>
    <p class="subtitle">注册后请到邮箱验证，再回到登录页登录</p>
    <form class="form" id="registerForm">
      <input id="email" type="email" placeholder="邮箱" autocomplete="email" required>
      <input id="password" type="password" placeholder="密码（至少 8 位）" autocomplete="new-password" required>
      <button id="submitBtn" type="submit">注册并发送验证邮件</button>
    </form>
    <p class="message" id="message"></p>
    <div class="links">
      <a href="/login">去登录</a>
      <a href="/">返回首页</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    function setMessage(text, isError = false) {
      message.textContent = text || '';
      message.classList.toggle('error', Boolean(isError));
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) {
        setMessage('请输入邮箱和密码。', true);
        return;
      }

      submitBtn.disabled = true;
      setMessage('注册中...');
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || '注册失败');
        }
        setMessage((data.message || '注册成功，请检查邮箱验证。') + ' 验证后请前往登录页。');
        passwordInput.value = '';
      } catch (error) {
        setMessage(error.message || '注册失败', true);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
