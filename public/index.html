<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片/视频压缩工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .upload-area {
      border: 2px dashed #d1d5db;
      border-radius: 12px;
      padding: 50px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: #667eea;
      background: #f0f4ff;
    }

    .upload-area svg {
      width: 48px;
      height: 48px;
      color: #9ca3af;
      margin-bottom: 12px;
    }

    .upload-area p {
      color: #6b7280;
      font-size: 1rem;
    }

    .upload-area .hint {
      color: #9ca3af;
      font-size: 0.85rem;
      margin-top: 8px;
    }

    .upload-input {
      display: none;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 20px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 8px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .controls label {
      font-size: 0.9rem;
      color: #374151;
      white-space: nowrap;
    }

    .controls input[type="range"] {
      flex: 1;
      cursor: pointer;
    }

    .controls select {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #374151;
    }

    .quality-value {
      font-weight: 600;
      color: #667eea;
      min-width: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
    }

    .file-list {
      margin-top: 16px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: #f3f4f6;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .file-item .name {
      flex: 1;
      font-size: 0.9rem;
      color: #374151;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-item .size {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .file-item .remove {
      cursor: pointer;
      color: #ef4444;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .file-item .remove:hover {
      transform: scale(1.1);
    }

    .results {
      margin-top: 24px;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .result-item .info {
      flex: 1;
    }

    .result-item .info .filename {
      font-weight: 600;
      color: #166534;
      font-size: 0.95rem;
    }

    .result-item .info .stats {
      font-size: 0.8rem;
      color: #4b5563;
      margin-top: 4px;
    }

    .result-item .info .ratio {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 8px;
    }

    .result-item .download-btn {
      padding: 8px 16px;
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .result-item .download-btn:hover {
      background: #059669;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 30px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      color: #6b7280;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .preview-grid img,
    .preview-grid video {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      background: #111827;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ 图片/视频压缩工具</h1>
    <p class="subtitle">原文件直传 Vercel Blob，压缩结果保留 24 小时</p>

    <div class="card">
      <div class="upload-area" id="uploadArea">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 16v-8m0 0l-3 3m3-3l3 3M3 16.5V18a2.5 2.5 0 002.5 2.5h13A2.5 2.5 0 0021 18v-1.5M16.5 7.5L12 3 7.5 7.5"/>
        </svg>
        <p>点击或拖拽图片/视频到这里上传</p>
        <p class="hint">图片支持 JPEG、PNG、GIF、BMP、TIFF、WebP；视频支持 MP4、WebM、MOV、AVI；最多 20 个文件</p>
      </div>
      <input type="file" class="upload-input" id="fileInput" multiple accept="image/*,video/*">

      <div class="file-list" id="fileList"></div>
      <div class="preview-grid" id="previewGrid"></div>

      <div class="controls">
        <div class="control-row">
          <label>压缩质量：</label>
          <input type="range" id="quality" min="1" max="100" value="80">
          <span class="quality-value" id="qualityValue">80%</span>
        </div>
        <div class="control-row">
          <label>图片输出格式：</label>
          <select id="imageFormat">
            <option value="webp">WebP</option>
            <option value="jpeg">JPEG</option>
            <option value="png">PNG</option>
            <option value="avif">AVIF</option>
          </select>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="compressBtn" disabled>开始压缩</button>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在压缩中，请稍候...</p>
      </div>

      <div class="error" id="error"></div>

      <div class="results" id="results"></div>
    </div>
  </div>

  <script type="module">
    import { upload } from 'https://esm.sh/@vercel/blob@0.23.3/client';

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const previewGrid = document.getElementById('previewGrid');
    const qualitySlider = document.getElementById('quality');
    const qualityValue = document.getElementById('qualityValue');
    const imageFormatSelect = document.getElementById('imageFormat');
    const compressBtn = document.getElementById('compressBtn');
    const loading = document.getElementById('loading');
    const loadingText = loading.querySelector('p');
    const errorEl = document.getElementById('error');
    const resultsEl = document.getElementById('results');

    let selectedFiles = [];

    qualitySlider.addEventListener('input', () => {
      qualityValue.textContent = qualitySlider.value + '%';
    });

    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
      addFiles(files);
    });

    fileInput.addEventListener('change', () => {
      addFiles(Array.from(fileInput.files));
      fileInput.value = '';
    });

    function addFiles(files) {
      selectedFiles = [...selectedFiles, ...files].slice(0, 20);
      renderFileList();
      compressBtn.disabled = selectedFiles.length === 0;
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      renderFileList();
      compressBtn.disabled = selectedFiles.length === 0;
    }

    window.removeFile = removeFile;

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function escapeHTML(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function sanitizePathSegment(value) {
      return String(value || 'image')
        .normalize('NFKC')
        .replace(/[\\/:*?"<>|#%{}^~[\]`\r\n\t]+/g, '_')
        .replace(/\s+/g, '_')
        .replace(/_+/g, '_')
        .replace(/^_+|_+$/g, '')
        .slice(0, 120) || 'image';
    }

    function getUploadPath(file) {
      return `uploads/${Date.now()}-${Math.random().toString(36).slice(2)}-${sanitizePathSegment(file.name)}`;
    }

    function renderFileList() {
      fileList.innerHTML = selectedFiles.map((file, i) => `
        <div class="file-item">
          <span class="name">${escapeHTML(file.name)}</span>
          <span class="size">${formatSize(file.size)}</span>
          <svg class="remove" onclick="removeFile(${i})" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,6 5,6 21,6"></polyline>
            <path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6M8,6V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </div>
      `).join('');

      previewGrid.innerHTML = '';
      selectedFiles.forEach(file => {
        const preview = file.type.startsWith('video/') ? document.createElement('video') : document.createElement('img');
        preview.src = URL.createObjectURL(file);
        if (file.type.startsWith('video/')) {
          preview.controls = true;
          preview.muted = true;
        }
        previewGrid.appendChild(preview);
      });
    }

    async function uploadFilesToBlob() {
      const uploadedFiles = [];
      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        loadingText.textContent = `正在上传原图 ${i + 1}/${selectedFiles.length}，请稍候...`;
        const blob = await upload(getUploadPath(file), file, {
          access: 'public',
          handleUploadUrl: '/api/upload',
        });
        uploadedFiles.push({
          name: file.name,
          size: file.size,
          type: file.type,
          url: blob.url,
          downloadUrl: blob.downloadUrl || blob.url,
          pathname: blob.pathname,
        });
      }
      return uploadedFiles;
    }

    compressBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      loading.classList.add('active');
      errorEl.style.display = 'none';
      resultsEl.innerHTML = '';
      compressBtn.disabled = true;

      try {
        const uploadedFiles = await uploadFilesToBlob();
        loadingText.textContent = '正在压缩中，请稍候...';
        const response = await fetch('/api/compress', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            quality: qualitySlider.value,
            imageFormat: imageFormatSelect.value,
            files: uploadedFiles,
          }),
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || '压缩失败');
        }

        renderResults(data.results);
      } catch (err) {
        errorEl.textContent = '❌ ' + err.message;
        errorEl.style.display = 'block';
      } finally {
        loadingText.textContent = '正在压缩中，请稍候...';
        loading.classList.remove('active');
        compressBtn.disabled = selectedFiles.length === 0;
      }
    });

    function renderResults(results) {
      resultsEl.innerHTML = results.map(r => {
        const dimensions = r.mediaType === 'image' ? `&nbsp;|&nbsp; ${escapeHTML(r.width)} × ${escapeHTML(r.height)}` : '';
        const mediaLabel = r.mediaType === 'video' ? '视频' : '图片';
        return `
          <div class="result-item">
            <div class="info">
              <div class="filename">${escapeHTML(r.originalName)} → ${escapeHTML(r.outputFilename)}</div>
              <div class="stats">
                ${mediaLabel} ${formatSize(r.originalSize)} → ${formatSize(r.compressedSize)}
                <span class="ratio">压缩 ${escapeHTML(r.compressionRatio)}%</span>
                ${dimensions}
                &nbsp;|&nbsp; 文件保留 ${escapeHTML(r.expiresInHours)} 小时
              </div>
            </div>
            <a href="${escapeHTML(r.downloadUrl || r.url)}" download="${escapeHTML(r.outputFilename)}" class="download-btn">下载 ${escapeHTML(r.outputFormat).toUpperCase()}</a>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
